<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Login — CLAC Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --forest:#1a2e1e; --forest-mid:#243329; --amber:#c8903a; --amber-light:#e4a84d; --cream:#f2ede4; --linen:#faf7f2; --rule:#d4c9b0; --red:#c0392b; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'DM Sans',sans-serif; }
body { background:var(--forest); display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }

/* Texture */
body::before { content:''; position:fixed; inset:0; background-image: repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px), repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px); pointer-events:none; z-index:0; }

.login-wrap { position:relative; z-index:1; width:100%; max-width:440px; padding:20px; }

.login-box { background:var(--linen); padding:52px 44px; }

.login-logo { text-align:center; margin-bottom:40px; }
.ll-badge { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--amber); background:rgba(200,144,58,0.1); border:1px solid rgba(200,144,58,0.3); padding:5px 14px; display:inline-block; margin-bottom:16px; }
.ll-title { font-family:'Playfair Display',serif; font-size:24px; font-weight:900; color:var(--forest); line-height:1.1; }
.ll-sub { font-size:13px; color:#7a7a70; margin-top:8px; }

.form-group { margin-bottom:20px; }
.form-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--amber); display:block; margin-bottom:8px; }
.form-input { width:100%; padding:13px 16px; border:1px solid var(--rule); background:white; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--forest); outline:none; transition:border-color 0.2s; }
.form-input:focus { border-color:var(--amber); }
.form-input::placeholder { color:#adadA0; }

.login-btn { width:100%; background:var(--forest); color:var(--amber); font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; padding:15px; border:none; cursor:pointer; transition:background 0.2s; margin-top:8px; }
.login-btn:hover { background:#2f4535; }
.login-btn:active { transform:scale(0.99); }

.error-msg { background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.3); color:var(--red); font-size:13px; padding:10px 14px; margin-bottom:18px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.05em; display:none; }
.error-msg.show { display:block; }

.login-footer { text-align:center; margin-top:28px; }
.login-footer a { font-size:12px; color:var(--amber); text-decoration:none; font-family:'DM Mono',monospace; letter-spacing:0.08em; }
.login-footer a:hover { color:var(--amber-light); }

.demo-info { background:rgba(200,144,58,0.08); border:1px solid rgba(200,144,58,0.2); padding:14px 16px; margin-bottom:24px; }
.demo-info p { font-size:12px; color:#5a5a50; line-height:1.6; font-family:'DM Mono',monospace; }
.demo-info strong { color:var(--forest); }

.spin { display:inline-block; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="ll-badge">Board Members Only</div>
      <div class="ll-title">CLAC Admin Portal</div>
      <div class="ll-sub">Clevelando Lietuvių Bendruomenė</div>
    </div>

    <div class="demo-info">
      <p><strong>Demo credentials:</strong><br>
      Username: <strong>admin</strong> &nbsp;·&nbsp; Password: <strong>clac2025!</strong><br>
      or: <strong>richard</strong> / <strong>clac2025!</strong></p>
    </div>

    <div class="error-msg" id="error-msg">Incorrect username or password. Please try again.</div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In →</button>

    <div class="login-footer">
      <a href="../index.html">← Back to the public site</a>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CLAC DATA LAYER
//  Cleveland Lithuanian American Community — clacleveland.org
//  All site data stored in localStorage under "clac_*" keys.
//  To migrate to a real backend, swap the save()/all() methods in each module
//  to API calls — the frontend pages require no changes.
// ─────────────────────────────────────────────────────────────────────────────

const CLAC = {

  // ── AUTH ─────────────────────────────────────────────────────────────────
  // Production: replace this with a real auth service (Supabase, Firebase, etc.)
  auth: {
    users: [
      { username: 'admin',   password: 'clac2025!', name: 'Board Admin',     role: 'admin'  },
      { username: 'richard', password: 'clac2025!', name: 'Richard (Chair)', role: 'editor' },
      { username: 'editor',  password: 'clac2025!', name: 'Board Editor',    role: 'editor' }
    ],
    login(username, password) {
      const user = this.users.find(u => u.username === username && u.password === password);
      if (!user) return null;
      const session = { username: user.username, name: user.name, role: user.role, ts: Date.now() };
      localStorage.setItem('clac_session', JSON.stringify(session));
      return session;
    },
    logout() {
      localStorage.removeItem('clac_session');
    },
    current() {
      const raw = localStorage.getItem('clac_session');
      if (!raw) return null;
      const session = JSON.parse(raw);
      // 8-hour session timeout
      if (Date.now() - session.ts > 8 * 60 * 60 * 1000) { this.logout(); return null; }
      return session;
    },
    require() {
      const s = this.current();
      if (!s) { window.location.href = '/admin/index.html'; return null; }
      return s;
    }
  },

  // ── EVENTS ───────────────────────────────────────────────────────────────
  events: {
    _key: 'clac_events',

    _defaults: [
      {
        id: 'spring-gathering-2025',
        title: 'Spring Community Gathering',
        titleLt: 'Pavasario Bendruomenės Susirinkimas',
        date: '2025-04-19',
        time: '2:00 PM',
        endTime: '6:00 PM',
        location: 'Lithuanian Cultural Garden, Rockefeller Park',
        address: '750 E 88th St, Cleveland, OH 44108',
        category: 'Cultural',
        status: 'upcoming',
        featured: true,
        coverColor: '#2d4a33',
        description: `Our annual spring gathering returns to the Lithuanian Cultural Garden in Rockefeller Park. This beloved tradition brings together Cleveland's Lithuanian community for an afternoon of food, music, and fellowship beneath the open sky.\n\nBring a dish to share — traditional Lithuanian recipes always welcome, but anything goes. We'll have music, time for children to run around, and plenty of good conversation.\n\nAll members, families, and friends are warmly welcome. No RSVP required — just show up!`,
        descriptionLt: 'Mūsų metinis pavasario susirinkimas grįžta į Lietuvių kultūros sodą Rokfelerio parke.',
        photos: [],
        contactName: 'Board Contact',
        contactEmail: 'info@clacleveland.org',
        rsvpLink: '',
        tags: ['Annual', 'Potluck', 'Family-Friendly', 'Outdoors'],
        attendees: null,
        recap: '',
        published: true,
        createdAt: '2025-03-01',
        updatedAt: '2025-03-28'
      },
      {
        id: 'mothers-day-mass-2025',
        title: "Mother's Day Mass",
        titleLt: 'Motinos Dienos Mišios',
        date: '2025-05-11',
        time: '10:00 AM',
        endTime: '12:00 PM',
        location: 'St. George Lithuanian Church',
        address: 'E. 185th Street, Cleveland, OH',
        category: 'Religious',
        status: 'upcoming',
        featured: false,
        coverColor: '#1e2e3a',
        description: `Annual Mother's Day Lithuanian Mass at St. George's, the heart of Cleveland's Lithuanian heritage. Mass in Lithuanian with reception to follow in the parish hall.\n\nAll are welcome — bring your mothers, grandmothers, and families.`,
        descriptionLt: '',
        photos: [],
        contactName: 'Board Contact',
        contactEmail: 'info@clacleveland.org',
        rsvpLink: '',
        tags: ['Annual', 'Religious', 'Family'],
        attendees: null,
        recap: '',
        published: true,
        createdAt: '2025-03-01',
        updatedAt: '2025-03-01'
      },
      {
        id: 'one-world-day-2024',
        title: 'One World Day 2024',
        titleLt: 'Viso Pasaulio Diena 2024',
        date: '2024-09-08',
        time: '11:00 AM',
        endTime: '5:00 PM',
        location: 'Rockefeller Park, Cleveland',
        address: '750 E 88th St, Cleveland, OH 44108',
        category: 'Festival',
        status: 'past',
        featured: true,
        coverColor: '#3d2e1a',
        description: `Cleveland's beloved One World Day returned to Rockefeller Park and the Lithuanian community showed up in force — our largest presence in recent memory.\n\nVolunteers in traditional dress staffed the Lithuanian booth with food, crafts, and information about our community. Thousands of Clevelanders stopped by to learn about Lithuania.\n\nThank you to all who volunteered, cooked, and represented our heritage with such pride.`,
        descriptionLt: '',
        photos: [],
        contactName: 'Board Contact',
        contactEmail: 'info@clacleveland.org',
        rsvpLink: '',
        tags: ['Annual', 'Multicultural', 'Outreach'],
        attendees: 200,
        recap: 'Record attendance. Lithuanian booth drew strong interest. Traditional dress and food were highlights.',
        published: true,
        createdAt: '2024-09-20',
        updatedAt: '2024-09-20'
      },
      {
        id: 'mindaugas-picnic-2024',
        title: 'Mindaugas Day Picnic',
        titleLt: 'Mindaugo Dienos Piknikas',
        date: '2024-07-06',
        time: '1:00 PM',
        endTime: '5:00 PM',
        location: 'Community Grounds, Greater Cleveland',
        address: 'Cleveland, OH',
        category: 'Celebration',
        status: 'past',
        featured: false,
        coverColor: '#2a1e2e',
        description: `Celebrating Lithuania's national holiday — the Coronation of King Mindaugas — with our annual summer picnic. Food, games, and great company under the summer sun.`,
        descriptionLt: '',
        photos: [],
        contactName: 'Board Contact',
        contactEmail: 'info@clacleveland.org',
        rsvpLink: '',
        tags: ['Annual', 'National Holiday', 'Picnic'],
        attendees: 45,
        recap: '',
        published: true,
        createdAt: '2024-07-10',
        updatedAt: '2024-07-10'
      }
    ],

    _init() {
      if (!localStorage.getItem(this._key)) {
        localStorage.setItem(this._key, JSON.stringify(this._defaults));
      }
    },
    all() {
      this._init();
      return JSON.parse(localStorage.getItem(this._key));
    },
    get(id) {
      return this.all().find(e => e.id === id) || null;
    },
    upcoming() {
      return this.all()
        .filter(e => e.status === 'upcoming' && e.published)
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    },
    past() {
      return this.all()
        .filter(e => e.status === 'past' && e.published)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    },
    save(event) {
      const all = this.all();
      const idx = all.findIndex(e => e.id === event.id);
      event.updatedAt = new Date().toISOString().split('T')[0];
      if (idx >= 0) { all[idx] = event; } else { all.unshift(event); }
      localStorage.setItem(this._key, JSON.stringify(all));
      return event;
    },
    delete(id) {
      localStorage.setItem(this._key, JSON.stringify(this.all().filter(e => e.id !== id)));
    },
    slugify(title) {
      return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '')
        + '-' + Date.now().toString(36);
    }
  },

  // ── ANNOUNCEMENTS ────────────────────────────────────────────────────────
  announcements: {
    _key: 'clac_announcements',

    _defaults: [
      { id: 'ann-1', type: 'Community Update',     title: 'Spring 2025 Gathering Confirmed for April 19',       body: 'Our annual spring gathering returns to the Lithuanian Cultural Garden in Rockefeller Park. Potluck format — bring a dish. All welcome.',                                          date: '2025-03-28', published: true },
      { id: 'ann-2', type: 'National Organization', title: 'LAC Newsletter Spring Edition Now Available',         body: 'The national Lithuanian American Community newsletter for Spring 2025 is now available at javlb.lt/en/naujienlaiskiui.',                                                        date: '2025-03-15', published: true },
      { id: 'ann-3', type: 'Heritage',              title: 'Cultural Garden Spring Cleanup — Volunteers Needed',  body: 'Volunteers needed for the annual spring cleanup of the Lithuanian Cultural Garden at Rockefeller Park. Contact us via Facebook to sign up.',                                  date: '2025-03-10', published: true },
      { id: 'ann-4', type: 'Membership',            title: '2025 Membership Renewal — Open Now',                 body: 'Annual membership renewal is open. Supporting the community through membership helps fund our events and cultural programming. Contact the board for details.',               date: '2025-01-05', published: true }
    ],

    _init() {
      if (!localStorage.getItem(this._key)) {
        localStorage.setItem(this._key, JSON.stringify(this._defaults));
      }
    },
    all() {
      this._init();
      return JSON.parse(localStorage.getItem(this._key));
    },
    published() {
      return this.all()
        .filter(a => a.published)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    },
    save(ann) {
      const all = this.all();
      const idx = all.findIndex(a => a.id === ann.id);
      if (idx >= 0) { all[idx] = ann; } else { all.unshift(ann); }
      localStorage.setItem(this._key, JSON.stringify(all));
    },
    delete(id) {
      localStorage.setItem(this._key, JSON.stringify(this.all().filter(a => a.id !== id)));
    }
  },

  // ── SETTINGS ─────────────────────────────────────────────────────────────
  settings: {
    _key: 'clac_settings',

    _defaults: {
      siteName:      'Cleveland Lithuanian American Community',
      siteNameLt:    'Clevelando Lietuvių Bendruomenė',
      email:         'info@clacleveland.org',
      facebook:      'https://www.facebook.com/profile.php?id=61565856471983',
      instagram:     'https://www.instagram.com/cleveland_lietuviu_bendruomene',
      nationalUrl:   'https://javlb.lt/en/',
      tickerText:    'St. George Lithuanian Church — Sundays at 10:00 AM · Lithuanian Cultural Garden — Rockefeller Park · Follow us on Facebook & Instagram',
      heroHeadline:  'One community. Many stories. One Cleveland.',
      heroSub:       'The heartbeat of Lithuanian culture in Northeast Ohio — celebrating our heritage, connecting generations, and building a living community here on the shores of Lake Erie.'
    },

    get() {
      const stored = localStorage.getItem(this._key);
      return stored ? { ...this._defaults, ...JSON.parse(stored) } : { ...this._defaults };
    },
    save(data) {
      localStorage.setItem(this._key, JSON.stringify(data));
    }
  },

  // ── HELPERS ──────────────────────────────────────────────────────────────
  formatDate(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  },
  formatDateShort(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
  },
  monthDay(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return {
      month: d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase(),
      day:   d.getDate()
    };
  }
};

</script>
<script>
// Redirect if already logged in
if (CLAC.auth.current()) window.location.href = 'dashboard.html';

document.getElementById('password').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keypress', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  err.classList.remove('show');
  btn.innerHTML = '<span class="spin">◌</span> Signing in...';
  btn.disabled = true;

  setTimeout(() => {
    const session = CLAC.auth.login(u, p);
    if (session) {
      btn.innerHTML = 'Welcome, ' + session.name + ' ✓';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
    } else {
      err.classList.add('show');
      btn.innerHTML = 'Sign In →';
      btn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }, 700);
}
</script>
</body>
</html>
